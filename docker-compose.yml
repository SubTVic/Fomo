services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fomo
      POSTGRES_PASSWORD: fomo_dev
      POSTGRES_DB: fomo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fomo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Production container (uncomment when ready for deployment)
  # app:
  #   build: .
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://fomo:fomo_dev@db:5432/fomo
  #     NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  #     NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
